name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Update once per day
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          base: ""
          filename: metrics.svg

          # ✅ Enable Radar plugin
          plugin_radar: yes
          plugin_radar_facts: yes
          plugin_radar_languages: no
          plugin_radar_categories: |
            commits
            issues
            pull_requests
            code_review
